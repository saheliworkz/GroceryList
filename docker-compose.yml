services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    ports:
      - "80:8080"
    volumes:
      - grocery_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
volumes:
  grocery_data:
